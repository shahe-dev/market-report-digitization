<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{enhanced.seoMetaContent.titleTag}}</title>
  <meta name="description" content="{{enhanced.seoMetaContent.metaDescription}}">
  <link rel="canonical" href="{{metadata.canonicalUrl}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {{JSON.stringify(schemaOrg)}}
  </script>

  <style>
  {{INLINE_CSS_FROM_mpp-report-styles.css}}
  </style>
</head>
<body>

<header class="report-header">
  <h1 class="report-header__title">{{enhanced.seoMetaContent.h1Primary | split(' - ') | wrapLastIn('highlight')}}</h1>
  <p class="report-header__subtitle">{{rawTextPassages.headerText}}</p>
  <p class="report-header__period">{{metadata.periodRange}}</p>
</header>

{{FOR section IN enhanced.sectionOrder}}
  {{RENDER_TEMPLATE(section)}}
{{END FOR}}

</body>
</html>
